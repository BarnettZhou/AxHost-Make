<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{PAGE_NAME}} Component</title>
  <link rel="stylesheet" href="resources/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --demo-bg: #ebe7f3;
      --demo-surface: #fff;
      --demo-border: #f0f0f0;
      --demo-text: #333;
    }
    html, body { width: 100%; height: 100%; background: var(--demo-bg); }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .demo-container {
      width: 100%;
      max-width: 1200px;
      max-height: 720px;
      height: 100%;
      background: var(--demo-surface);
      border-radius: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .demo-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--demo-border);
      flex-shrink: 0;
    }
    .demo-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--demo-text);
      margin: 0;
    }
    .demo-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }
    .demo-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--demo-border);
      flex-shrink: 0;
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .demo-btn {
      padding: 6px 16px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #d9d9d9;
      color: #333;
      transition: all 0.2s;
    }
    .demo-btn:hover {
      border-color: #4096ff;
      color: #4096ff;
    }
    body.dark .demo-header,
    body.dark .demo-footer { background: #161b22; border-color: #30363d; }
    body.dark .demo-body { background: #161b22; }
    body.dark .demo-header h2 { color: var(--text-primary, #e3e3e3); }
    body.dark .demo-btn { background: #21262d; border-color: #30363d; color: #e3e3e3; }
    body.dark .demo-btn:hover { border-color: #4096ff; color: #4096ff; }
  </style>
</head>
<body class="{{PAGE_THEME}}">
  <!-- ========== 演示外壳（仅用于独立预览）========== -->
  <div class="demo-container">
    <div class="demo-header">
      <h2>{{PAGE_NAME}}</h2>
    </div>
    <div class="demo-body">
      <!-- ========== 组件本体（可被 page 复用）========== -->
      <div class="ax-component">
        <!-- 组件真正的 HTML 结构 -->
      </div>
    </div>
    <div class="demo-footer demo-controls">
      <!-- 触发组件效果的按钮放置区域 -->
      <button class="demo-btn" onclick="handleAction('action1')">示例操作</button>
    </div>
  </div>
  <script src="resources/js/main.js"></script>
</body>
</html>
