<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{PAGE_NAME}} Component</title>
  <link rel="stylesheet" href="resources/css/style.css">
  <style>
    :root {
      --demo-bg: #ebe7f3;
      --demo-surface: #fff;
      --demo-border: #f0f0f0;
      --demo-text: #333;
      --demo-dark: #000;
    }
    body.dark {
      --demo-bg: #1e1e1e;
      --demo-surface: #252526;
      --demo-border: #3e3e42;
      --demo-text: #ccc;
      --demo-dark: #ccc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: var(--demo-bg); }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .device-wrapper {
      display: flex;
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .phone {
      width: 375px;
      height: 812px;
      background: var(--demo-surface);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 14px;
      font-weight: 600;
      color: var(--demo-dark);
    }
    .dynamic-island {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 32px;
      background: var(--demo-dark);
      border-radius: 16px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .signal {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }
    .signal span {
      width: 3px;
      background: var(--demo-dark);
      border-radius: 1px;
    }
    .signal span:nth-child(1) { height: 4px; }
    .signal span:nth-child(2) { height: 6px; }
    .signal span:nth-child(3) { height: 8px; }
    .signal span:nth-child(4) { height: 12px; }
    .battery {
      width: 22px;
      height: 11px;
      border: 1px solid var(--demo-dark);
      border-radius: 2px;
      position: relative;
      padding: 1px;
    }
    .battery::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 5px;
      background: var(--demo-dark);
      border-radius: 0 1px 1px 0;
    }
    .battery-level {
      width: 70%;
      height: 100%;
      background: var(--demo-dark);
      border-radius: 1px;
    }

    .phone-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .phone-content::-webkit-scrollbar { display: none; }

    .home-indicator {
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .indicator-bar {
      width: 134px;
      height: 4px;
      background: var(--demo-dark);
      border-radius: 2px;
    }

    .control-panel {
      width: 280px;
      height: 812px;
      background: var(--demo-surface);
      border-radius: 0;
      border-left: 1px solid var(--demo-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .control-panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--demo-border);
      flex-shrink: 0;
    }
    .control-panel-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--demo-text);
      margin: 0;
    }
    .control-panel-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <!-- ========== 演示外壳（仅用于独立预览）========== -->
  <div class="device-wrapper">
    <!-- 手机外壳 -->
    <div class="phone">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="dynamic-island"></div>
        <div class="status-icons">
          <div class="signal">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="battery">
            <div class="battery-level"></div>
          </div>
        </div>
      </div>
      <div class="phone-content">
        <!-- ========== 组件本体（可被 page 复用）========== -->
        <div class="ax-component">
          <!-- 组件真正的 HTML 结构 -->
        </div>
      </div>
      <div class="home-indicator">
        <div class="indicator-bar"></div>
      </div>
    </div>

    <!-- 右侧控制面板 -->
    <div class="control-panel">
      <div class="control-panel-header">
        <h2>{{PAGE_NAME}}</h2>
      </div>
      <div class="control-panel-body demo-controls">
        <!-- 触发组件效果的按钮放置区域 -->
      </div>
    </div>
  </div>
  <script>
    (function() {
      function setTheme(dark) {
        document.body.classList.toggle('dark', dark);
        localStorage.setItem('axhost-theme', dark ? 'dark' : 'light');
      }
      var stored = localStorage.getItem('axhost-theme');
      if (stored === 'dark') setTheme(true);
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'axhost-theme') setTheme(e.data.theme === 'dark');
      });
    })();
  </script>
  <script src="resources/js/main.js"></script>
</body>
</html>
