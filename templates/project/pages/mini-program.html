<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{PAGE_NAME}}</title>
  <link rel="stylesheet" href="resources/css/style.css">
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="dynamic-island"></div>
      <div class="status-icons">
        <div class="signal">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="battery">
          <div class="battery-level"></div>
        </div>
      </div>
    </div>

    <!-- Mini Program -->
    <div class="mini-program">
      <!-- Mini Program Bar -->
      <div class="mini-program-bar">
        <span class="bar-title">{{PAGE_NAME}}</span>
        <div class="capsule">
          <div class="capsule-more">
            <span></span><span></span><span></span>
          </div>
          <div class="capsule-divider"></div>
          <div class="capsule-close">
            <span class="close-ring"></span>
            <span class="close-dot"></span>
          </div>
        </div>
      </div>

      <!-- Page Content -->
      <div class="mini-program-content">
        <div style="padding:24px;">
          <h1>{{PAGE_NAME}}</h1>
          <p>这是一个新创建的小程序原型页面，请在文档中描述需求后通过 Agent 生成具体内容。</p>
        </div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator">
      <div class="indicator-bar"></div>
    </div>
  </div>
  <script src="resources/js/main.js"></script>
</body>
</html>
