<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype Index</title>
  <link rel="stylesheet" href="resources/css/shell.css">
</head>
<body class="preview-mode">
  <div id="app">
    <header id="shell-header">
      <button id="btn-toggle-nav" title="Toggle Nav">☰</button>
      <span class="title" id="project-name">Prototype</span>
      <button id="btn-toggle-docs" title="Toggle Docs"><axhost-icon icon="document-folder" size="14"></axhost-icon></button>
      <button id="btn-theme" title="Toggle Theme"><axhost-icon icon="moon" size="14"></axhost-icon></button>
    </header>

    <div id="shell-main">
      <aside id="panel-nav">
        <div class="nav-tabs">
          <button data-tab="pages" class="active">Pages</button>
          <button data-tab="components">Components</button>
        </div>
        <div class="tree-container" id="tree-root"></div>
      </aside>
      <div class="resizer resizer-v" data-target="panel-nav" data-dir="v"></div>

      <section id="panel-center">
        <div class="iframe-wrapper">
          <iframe id="preview-frame" src="about:blank"></iframe>
        </div>
        <div id="prompt-box" style="display:none;"></div>
      </section>

      <div class="resizer resizer-v" data-target="panel-docs" data-dir="v" data-invert="true"></div>
      <aside id="panel-docs" class="hidden">
        <div class="doc-tabs" id="doc-tabs"></div>
        <div class="doc-content" id="doc-content"></div>
      </aside>
    </div>
  </div>

  <script src="resources/js/icons.js"></script>
  <script src="sitemap.js"></script>
  <script src="resources/js/marked.min.js"></script>
  <script>
    (function(){
      const btnTheme = document.getElementById('btn-theme');
      const icon = btnTheme.querySelector('axhost-icon');
      const isDark = localStorage.getItem('axhost-theme') === 'dark';
      if (isDark) document.body.classList.add('dark');
      if (icon) icon.setAttribute('icon', document.body.classList.contains('dark') ? 'sun-one' : 'moon');
      btnTheme.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const dark = document.body.classList.contains('dark');
        localStorage.setItem('axhost-theme', dark ? 'dark' : 'light');
        if (icon) icon.setAttribute('icon', dark ? 'sun-one' : 'moon');
      });
    })();
  </script>
  <script>
    (function () {
      const sidebar = document.getElementById('panel-nav');
      const preview = document.getElementById('preview-frame');
      const docsPanel = document.getElementById('panel-docs');
      const btnDocs = document.getElementById('btn-toggle-docs');
      const btnToggleNav = document.getElementById('btn-toggle-nav');
      const docTabs = document.getElementById('doc-tabs');
      const docContent = document.getElementById('doc-content');
      const treeRoot = document.getElementById('tree-root');
      const projectNameEl = document.getElementById('project-name');
      let activePath = null;
      let activeType = 'pages';
      let currentDocs = [];
      let activeDocIndex = 0;
      let expandedPaths = new Set();

      btnDocs.addEventListener('click', () => {
        docsPanel.classList.toggle('hidden');
      });
      if (btnToggleNav) {
        btnToggleNav.addEventListener('click', () => {
          sidebar.classList.toggle('hidden');
        });
      }

      const map = window.__axhostSitemap || { name: 'Prototype', pages: [], components: [] };
      if (projectNameEl) projectNameEl.textContent = map.name || 'Prototype';

      function renderMarkdown(mdText) {
        if (!window.marked) return '<p>marked.js not loaded</p>';
        return window.marked.parse(mdText || '', { headerIds: false, mangle: false });
      }

      async function loadDocs(type, pagePath) {
        currentDocs = [];
        activeDocIndex = 0;
        const base = './' + type + '/' + pagePath + '/docs/';
        const readmePath = base + 'readme.md';
        try {
          const res = await fetch(readmePath);
          if (res.ok) {
            const text = await res.text();
            currentDocs.push({ name: 'readme.md', path: readmePath, content: text });
          }
        } catch (e) {}
        renderDocTabs();
        renderDocContent();
      }

      function renderDocTabs() {
        docTabs.innerHTML = '';
        if (currentDocs.length === 0) {
          docTabs.innerHTML = '<span style="color:var(--text-muted);font-size:12px;padding:4px 0;">暂无文档</span>';
          return;
        }
        currentDocs.forEach((doc, idx) => {
          const tab = document.createElement('div');
          tab.className = 'doc-tab' + (idx === activeDocIndex ? ' active' : '');
          tab.textContent = doc.name;
          tab.onclick = () => {
            activeDocIndex = idx;
            renderDocTabs();
            renderDocContent();
          };
          docTabs.appendChild(tab);
        });
      }

      function renderDocContent() {
        if (currentDocs.length === 0) {
          docContent.innerHTML = '<p style="color:var(--text-muted)">该页面暂无文档。</p>';
          return;
        }
        const html = renderMarkdown(currentDocs[activeDocIndex].content);
        docContent.innerHTML = html;
      }

      function renderTabs() {
        const tabs = document.querySelectorAll('.nav-tabs button');
        tabs.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === activeType);
          btn.onclick = () => {
            activeType = btn.dataset.tab;
            renderTabs();
            renderTree();
          };
        });
      }

      function renderTree() {
        const nodes = map[activeType] || [];
        treeRoot.innerHTML = '';
        if (nodes.length === 0) {
          treeRoot.innerHTML = '<div class="empty">No ' + activeType + ' found.</div>';
          return;
        }
        const ul = document.createElement('ul');
        ul.className = 'tree-list';
        for (const node of nodes) {
          ul.appendChild(buildNode(node, activeType));
        }
        treeRoot.appendChild(ul);
      }

      function buildNode(node, type) {
        const li = document.createElement('li');
        li.className = 'tree-item';
        const label = document.createElement('div');
        label.className = 'tree-label';
        if (activePath === node.path) label.classList.add('active');

        const arrow = document.createElement('span');
        arrow.className = 'tree-arrow';
        arrow.textContent = node.type === 'dir' ? (expandedPaths.has(node.path) ? '▼' : '▶') : '';

        let icon = null;
        if (node.type === 'dir') {
          icon = document.createElement('axhost-icon');
          icon.setAttribute('size', '12');
          icon.setAttribute('icon', expandedPaths.has(node.path) ? 'folder-open' : 'folder-close');
        }

        const text = document.createElement('span');
        text.textContent = node.name;

        label.appendChild(arrow);
        if (icon) label.appendChild(icon);
        label.appendChild(text);
        li.appendChild(label);

        if (node.type === 'dir') {
          if (expandedPaths.has(node.path)) {
            const childrenUl = document.createElement('ul');
            childrenUl.className = 'tree-list';
            for (const child of (node.children || [])) {
              childrenUl.appendChild(buildNode(child, type));
            }
            li.appendChild(childrenUl);
          }
          label.addEventListener('click', () => {
            if (expandedPaths.has(node.path)) {
              expandedPaths.delete(node.path);
            } else {
              expandedPaths.add(node.path);
            }
            renderTree();
          });
          const iconEl = label.querySelector('axhost-icon');
          if (iconEl) {
            iconEl.setAttribute('icon', expandedPaths.has(node.path) ? 'folder-open' : 'folder-close');
          }
        } else {
          label.addEventListener('click', () => {
            activePath = node.path;
            renderTree();
            const prefix = type === 'components' ? 'components' : 'pages';
            preview.src = './' + prefix + '/' + node.path + '/index.html';
            loadDocs(type, node.path);
          });
        }
        return li;
      }

      function findFirst(nodes) {
        for (const n of nodes) {
          if (n.type === 'page' || n.type === 'component') return n;
          if (n.children) {
            const f = findFirst(n.children);
            if (f) return f;
          }
        }
        return null;
      }

      function initResizers() {
        let overlay = null;
        document.querySelectorAll('.resizer').forEach(resizer => {
          const target = document.getElementById(resizer.dataset.target);
          if (!target) return;
          const invert = resizer.dataset.invert === 'true';
          resizer.addEventListener('mousedown', (e) => {
            e.preventDefault();
            document.body.style.userSelect = 'none';
            overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:transparent;cursor:col-resize;';
            document.body.appendChild(overlay);
            const startX = e.clientX;
            const startWidth = target.offsetWidth;
            const maxWidth = resizer.dataset.target === 'panel-docs' ? window.innerWidth * 0.5 : 400;
            function onMove(ev) {
              const delta = invert ? startX - ev.clientX : ev.clientX - startX;
              target.style.width = Math.max(180, Math.min(maxWidth, startWidth + delta)) + 'px';
            }
            function onUp() {
              document.body.style.userSelect = '';
              if (overlay) { overlay.remove(); overlay = null; }
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });
        });
      }

      renderTabs();
      renderTree();
      initResizers();

      const first = findFirst(map.pages);
      if (first) {
        activePath = first.path;
        preview.src = './pages/' + first.path + '/index.html';
        loadDocs('pages', first.path);
      }
    })();
  </script>
</body>
</html>
