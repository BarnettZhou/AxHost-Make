<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axhost-Make</title>
  <link rel="icon" type="image/svg+xml" href="/client/icon.svg">
  <link rel="stylesheet" href="/client/css/home.css">
</head>
<body>
  <div id="app">
    <header id="home-header">
      <button id="btn-home" title="项目管理首页"><iconpark-icon icon-id="home" size="16"></iconpark-icon></button>
      <div id="tab-bar"></div>
      <div class="header-avatar-wrap" id="avatar-wrap">
        <button id="btn-avatar" class="avatar-btn" title="个人中心">
          <div class="avatar">A</div>
        </button>
        <div class="dropdown-menu" id="avatar-dropdown">
          <div class="dropdown-item" id="btn-theme-toggle">
            <iconpark-icon id="theme-toggle-icon" icon-id="moon" size="14" color="currentColor"></iconpark-icon>
            <span>切换主题</span>
          </div>
          <div class="dropdown-item" id="btn-system-settings">
            <iconpark-icon icon-id="setting-two" size="14" color="currentColor"></iconpark-icon>
            <span>系统设置</span>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item" id="btn-login">
            <iconpark-icon icon-id="login" size="14" color="currentColor"></iconpark-icon>
            <span>登录账号</span>
          </div>
        </div>
      </div>
    </header>

    <main id="home-main">
      <!-- 项目列表视图 -->
      <div id="project-list-view">
        <div class="control-bar">
          <div class="search-box">
            <iconpark-icon icon-id="search" size="14" class="search-icon"></iconpark-icon>
            <input type="text" id="search-input" placeholder="搜索项目..." autocomplete="off">
          </div>
          <div class="control-group">
            <div class="dropdown" id="sort-dropdown">
              <button class="btn-icon" id="btn-sort">
                <iconpark-icon icon-id="sort-three" size="14"></iconpark-icon>
                <span id="sort-label">最近修改</span>
              </button>
              <div class="dropdown-menu">
                <div class="dropdown-group-label">排序字段</div>
                <div class="dropdown-item active" data-sort-field="lastModified" data-sort-group="field">最近修改时间</div>
                <div class="dropdown-item" data-sort-field="name" data-sort-group="field">名称</div>
                <div class="dropdown-item" data-sort-field="createdAt" data-sort-group="field">创建时间</div>
                <div class="dropdown-group-label">排序方式</div>
                <div class="dropdown-item active" data-sort-dir="desc" data-sort-group="dir">降序</div>
                <div class="dropdown-item" data-sort-dir="asc" data-sort-group="dir">升序</div>
              </div>
            </div>
            <button class="btn-icon" id="btn-view-mode" title="切换视图">
              <iconpark-icon id="view-icon" icon-id="grid-four" size="14"></iconpark-icon>
            </button>
          </div>
        </div>

        <div class="action-bar">
          <button class="btn-primary" id="btn-new-project"><iconpark-icon icon-id="plus" size="14"></iconpark-icon>新建原型项目</button>
          <button class="btn-secondary" id="btn-import-project"><iconpark-icon icon-id="download" size="14"></iconpark-icon>导入已有项目</button>
        </div>

        <div id="project-list-body">
          <div class="project-grid" id="project-grid"></div>
        </div>
      </div>

      <!-- Shell iframe 视图 -->
      <div id="shell-container"></div>
    </main>
  </div>

  <!-- 新建项目弹窗 -->
  <div class="modal-overlay" id="new-project-modal">
    <div class="modal-content">
      <div class="modal-title">新建原型项目</div>
      <div class="modal-body">
        <label for="new-project-name">项目名称</label>
        <input type="text" id="new-project-name" placeholder="请输入项目名称" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-new">取消</button>
        <button class="btn-primary" id="btn-confirm-new">创建</button>
      </div>
    </div>
  </div>

  <!-- 系统设置弹窗 -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
      <div class="modal-title">系统设置</div>
      <div class="modal-body">
        <p style="color:var(--text-muted);">功能开发中，敬请期待...</p>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-settings">关闭</button>
      </div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-content">
      <div class="modal-title">登录账号</div>
      <div class="modal-body">
        <p style="color:var(--text-muted);">功能开发中，敬请期待...</p>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-login">关闭</button>
      </div>
    </div>
  </div>

  <script src="/client/js/icons.js"></script>
  <script src="/client/js/home.js"></script>
</body>
</html>
