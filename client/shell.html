<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axhost-Make Dev</title>
  <link rel="icon" type="image/svg+xml" href="/client/icon.svg">
  <link rel="stylesheet" href="/client/css/shell.css">
</head>
<body class="dev-mode">
  <div id="app">
    <header id="shell-header">
      <div class="header-left">
        <button id="btn-toggle-nav" title="Toggle Nav">☰</button>
        <span class="title">Axhost-Make Dev</span>
        <span id="btn-refresh-preview" title="刷新预览" style="cursor:pointer;margin-left:6px;display:inline-flex;align-items:center;">
          <iconpark-icon icon-id="redo" size="12" color="var(--text-muted)"></iconpark-icon>
        </span>
      </div>
      <div class="header-center">
        <button id="btn-preview" title="预览"><iconpark-icon icon-id="preview-open" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-open-editor" title="在编辑器中打开"><iconpark-icon icon-id="layout-five" size="14" color="currentColor"></iconpark-icon></button>
        <div id="editor-dropdown" class="editor-dropdown"></div>
        <button id="btn-export" title="导出"><iconpark-icon icon-id="upload" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-open-online" title="在线打开" class="disabled"><iconpark-icon icon-id="earth" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-settings" title="Settings"><iconpark-icon icon-id="setting-two" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-inspect" title="抓取元素"><iconpark-icon icon-id="magic" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-images" title="图片管理"><iconpark-icon icon-id="picture-one" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-toggle-right-bar" title="切换提示词面板"><iconpark-icon icon-id="writing-fluently" size="14" color="currentColor"></iconpark-icon></button>
      </div>
      <div class="header-right">
        <div class="zoom-control" title="预览缩放">
          <button id="btn-zoom-out"><iconpark-icon icon-id="minus" size="12" color="currentColor"></iconpark-icon></button>
          <span id="zoom-value">100%</span>
          <button id="btn-zoom-in"><iconpark-icon icon-id="plus" size="12" color="currentColor"></iconpark-icon></button>
        </div>
        <button id="btn-touch-emulation" title="触控模拟"><iconpark-icon icon-id="click-tap" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-toggle-annotations" title="查看标注"><iconpark-icon icon-id="comment" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-toggle-docs" title="Toggle Docs"><iconpark-icon icon-id="document-folder" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-shortcuts" title="快捷键"><iconpark-icon icon-id="keyboard-one" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-theme" title="Toggle Theme"><iconpark-icon icon-id="moon" size="14" color="currentColor"></iconpark-icon></button>
      </div>
    </header>

    <div id="shell-main">
      <aside id="panel-nav">
        <div id="panel-nav-top">
          <div class="nav-tabs">
            <button data-tab="pages" class="active" title="Pages"><iconpark-icon icon-id="page" size="16"></iconpark-icon></button>
            <button data-tab="components" title="Components"><iconpark-icon icon-id="components" size="16"></iconpark-icon></button>
            <button data-tab="flowcharts" title="Flowcharts"><iconpark-icon icon-id="split-turn-down-right" size="16"></iconpark-icon></button>
            <button data-tab="wiki" title="Wiki"><iconpark-icon icon-id="doc-detail" size="16"></iconpark-icon></button>
          </div>
          <div class="tree-container" id="tree-root"></div>
        </div>
        <div class="resizer resizer-h" data-target="panel-nav-top" data-dir="h" id="rules-resizer"></div>
        <div id="panel-nav-bottom">
          <div class="rules-header" id="rules-header" title="点击收起/展开">
            <span class="rules-header-arrow"><iconpark-icon icon-id="down" size="12" color="currentColor"></iconpark-icon></span>
            <span>Rules</span>
          </div>
          <div class="rules-list" id="rules-root"></div>
        </div>
      </aside>
      <div class="resizer resizer-v" data-target="panel-nav" data-dir="v"></div>

      <section id="panel-center">
        <div class="iframe-wrapper" id="iframe-wrapper">
          <iframe id="preview-frame" src="about:blank"></iframe>
          <div id="floating-prompt-box" class="floating-prompt-box">
            <div class="floating-prompt-header">
              <span id="prompt-context" class="prompt-context"></span>
              <div class="floating-prompt-header-actions">
                <button id="btn-float-resize" class="text-btn" title="切换高度">
                  <iconpark-icon icon-id="zoom-internal" size="12"></iconpark-icon>
                </button>
                <button id="btn-float-close" class="text-btn" title="关闭">
                  <iconpark-icon icon-id="close-small" size="14"></iconpark-icon>
                </button>
              </div>
            </div>
            <div class="floating-prompt-body">
              <textarea id="prompt-input" placeholder="描述你想要的修改，例如：将表格背景改为深蓝色，增加一个导出按钮..."></textarea>
              <div id="attach-popup" class="attach-popup">
                <div class="attach-popup-header">
                  <span>附件</span>
                  <div class="attach-popup-header-actions">
                    <button id="btn-attach-clear" title="清除全部附件">
                      <iconpark-icon icon-id="delete" size="12"></iconpark-icon>
                    </button>
                  </div>
                </div>
                <div class="attach-popup-body" id="attach-list"></div>
              </div>
              <div class="inspect-form hidden">
                <!-- 第二种状态预留：抓取元素结果展示 -->
              </div>
            </div>
            <div class="floating-prompt-footer">
              <button id="btn-prompt-copy">复制提示词<div id="prompt-status" class="prompt-status-tooltip hidden"></div></button>
            </div>
          </div>
        </div>
        <div id="rule-viewer" class="hidden">
          <div class="rule-viewer-content" id="rule-viewer-content"></div>
        </div>
      </section>

      <div class="resizer resizer-v" data-target="panel-right-bar" data-dir="v" data-invert="true" id="right-bar-resizer"></div>
      <aside id="panel-right-bar" class="hidden">
        <!-- prompt elements moved to #floating-prompt-box inside .iframe-wrapper -->
      </aside>

      <div class="resizer resizer-v" data-target="panel-annotations" data-dir="v" data-invert="true" id="annotations-resizer"></div>
      <aside id="panel-annotations" class="hidden">
        <div class="annotations-header">
          <span>标注列表</span>
          <button id="btn-annotations-close" title="关闭">
            <iconpark-icon icon-id="close-small" size="14" color="currentColor"></iconpark-icon>
          </button>
        </div>
        <div class="annotations-body" id="annotations-list"></div>
      </aside>

      <div class="resizer resizer-v" data-target="panel-docs" data-dir="v" data-invert="true" id="docs-resizer"></div>
      <aside id="panel-docs" class="hidden">
        <div class="doc-tabs" id="doc-tabs">
          <button class="doc-tab-scroll-btn hidden" id="btn-doc-scroll-left" title="向左滚动">
            <iconpark-icon icon-id="left" size="12" color="currentColor"></iconpark-icon>
          </button>
          <div class="doc-tabs-scroll" id="doc-tabs-scroll"></div>
          <button class="doc-tab-scroll-btn hidden" id="btn-doc-scroll-right" title="向右滚动">
            <iconpark-icon icon-id="right" size="12" color="currentColor"></iconpark-icon>
          </button>
          <button class="doc-tab-sort" id="btn-doc-sort" title="排序文档">
            <iconpark-icon icon-id="sort-three" size="12" color="currentColor"></iconpark-icon>
          </button>
          <button class="doc-tab-add" id="btn-doc-add" title="添加文档">
            <iconpark-icon icon-id="add-one" size="12" color="currentColor"></iconpark-icon>
          </button>
        </div>
        <div class="doc-content" id="doc-content"></div>
        <div class="doc-actions">
          <button id="btn-doc-action">编辑</button>
          <button id="btn-doc-preview" class="hidden" title="预览">
            <iconpark-icon icon-id="doc-detail" size="14" color="currentColor"></iconpark-icon>
          </button>
        </div>
      </aside>
    </div>
  </div>


  <script src="/client/js/icon-loader-shell.js"></script>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      window.__axhostProjectId = params.get('project') || '';
    })();
  </script>
  <script src="/client/assets/marked.min.js"></script>
  <script src="/client/assets/html-to-image.min.js"></script>
  <script src="/client/js/api-client.js"></script>
  <script src="/client/js/modal.js"></script>
  <script src="/client/js/md-renderer.js"></script>
  <script src="/client/js/autocomplete-core.js"></script>
  <!-- Export Modal -->
  <div id="export-modal" class="export-modal">
    <div class="export-modal-overlay"></div>
    <div class="export-modal-content">
      <div class="export-modal-header">
        <h4>导出项目</h4>
        <button class="export-modal-close" id="export-modal-close">&times;</button>
      </div>
      <div class="export-modal-body">
        <div class="export-left-panel">
          <div class="export-mode-tabs">
            <button data-mode="local" class="active">本地导出</button>
            <button data-mode="remote">线上发布</button>
          </div>
          <div class="export-mode-content" id="export-local-content">
            <div class="export-field">
              <label>项目名称</label>
              <input type="text" id="export-project-name" placeholder="项目名称">
            </div>
            <div class="export-field">
              <label>保存目录</label>
              <div class="export-dir-row">
                <input type="text" id="export-target-dir" placeholder="保存目录">
                <button id="export-select-dir">选择</button>
                <input type="file" id="export-dir-input" webkitdirectory directory style="display:none">
              </div>
            </div>
          </div>
          <div class="export-mode-content hidden" id="export-remote-content">
            <div class="export-field">
              <label>托管项目</label>
              <div class="host-project-row" id="export-host-project-row">
                <div class="host-project-select-wrap" id="export-host-project-wrap">
                  <input type="text" id="export-host-project-search" placeholder="搜索或选择项目..." autocomplete="off">
                  <div class="host-project-dropdown" id="export-host-project-dropdown"></div>
                  <div class="host-project-linked" id="export-host-project-linked" style="display:none;">
                    <span id="export-host-project-linked-name"></span>
                    <button class="text-btn" id="export-btn-unlink-project" title="解除关联">
                      <iconpark-icon icon-id="close-small" size="12" color="currentColor"></iconpark-icon>
                    </button>
                  </div>
                </div>
                <button class="text-btn" id="export-btn-create-remote-project" title="创建新项目">
                  <iconpark-icon icon-id="plus" size="14" color="currentColor"></iconpark-icon>
                </button>
              </div>
              <div class="host-project-hint" id="export-host-project-hint"></div>
            </div>
            <div class="export-field" id="export-preview-url-field" style="display:none;">
              <label>线上原型地址</label>
              <a id="export-preview-url" href="#" target="_blank" class="export-preview-url"></a>
            </div>
          </div>
        </div>
        <div class="export-right-panel">
          <div class="export-tabs">
            <button data-tab="pages" class="active" title="pages"><iconpark-icon icon-id="page" size="14"></iconpark-icon></button>
            <button data-tab="components" title="components"><iconpark-icon icon-id="components" size="14"></iconpark-icon></button>
            <button data-tab="flowcharts" title="flowcharts"><iconpark-icon icon-id="split-turn-down-right" size="14"></iconpark-icon></button>
          </div>
          <div class="export-tree" id="export-tree"></div>
          <div class="export-select-all">
            <label><input type="checkbox" id="export-select-all" checked> 全选</label>
          </div>
        </div>
      </div>
      <div class="export-modal-footer">
        <button id="export-cancel">取消</button>
        <button id="export-confirm" class="primary">导出</button>
      </div>
    </div>
  </div>

  <script src="/client/js/tree-nav.js"></script>
  <script src="/client/js/doc-panel.js"></script>
  <script src="/client/js/export-modal.js"></script>
  <script src="/client/js/inspector.js"></script>
  <script src="/client/js/annotation-viewer.js"></script>
  <script src="/client/js/image-manager.js"></script>
  <script src="/client/js/prompt-box.js"></script>
  <script src="/client/js/zoom-control.js"></script>
  <script src="/client/js/touch-emulation.js"></script>
  <script>
    (function(){
      const btnTheme = document.getElementById('btn-theme');
      const icon = btnTheme.querySelector('iconpark-icon');
      const isDark = localStorage.getItem('axhost-theme') === 'dark';
      if (isDark) document.body.classList.add('dark');
      if (icon) icon.setAttribute('icon-id', document.body.classList.contains('dark') ? 'dome-light' : 'moon');
      function syncThemeToIframe(dark) {
        const preview = document.getElementById('preview-frame');
        if (!preview) return;
        try {
          const doc = preview.contentDocument;
          if (doc && doc.body) {
            doc.body.style.background = dark ? '#1e1e1e' : '';
          }
        } catch (e) {}
        try {
          preview.contentWindow.postMessage({ type: 'axhost-theme', theme: dark ? 'dark' : 'light' }, '*');
        } catch (e) {}
      }

      btnTheme.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const dark = document.body.classList.contains('dark');
        localStorage.setItem('axhost-theme', dark ? 'dark' : 'light');
        if (icon) icon.setAttribute('icon-id', dark ? 'dome-light' : 'moon');
        document.querySelectorAll('iconpark-icon').forEach(el => {
          el.setAttribute('color', 'currentColor');
          el.setAttribute('stroke', 'currentColor');
          el.setAttribute('fill', 'currentColor');
        });
        // Sync theme to preview iframe
        syncThemeToIframe(dark);
      });

      // 接收父页面主题同步
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'axhost-theme') {
          const dark = e.data.theme === 'dark';
          const currentlyDark = document.body.classList.contains('dark');
          if (currentlyDark !== dark) {
            document.body.classList.toggle('dark', dark);
            localStorage.setItem('axhost-theme', dark ? 'dark' : 'light');
            if (icon) icon.setAttribute('icon-id', dark ? 'dome-light' : 'moon');
          }
        }
      });
    })();
  </script>
  <script src="/client/js/shell.js"></script>
</body>
</html>
