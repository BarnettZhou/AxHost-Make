<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axhost-Make Dev</title>
  <link rel="icon" type="image/svg+xml" href="/client/icon.svg">
  <link rel="stylesheet" href="/client/css/shell.css">
</head>
<body class="dev-mode">
  <div id="app">
    <header id="shell-header">
      <div class="header-left">
        <button id="btn-toggle-nav" title="Toggle Nav">☰</button>
        <span class="title">Axhost-Make Dev</span>
      </div>
      <div class="header-center">
        <button id="btn-preview" title="预览"><iconpark-icon icon-id="preview-open" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-open-editor" title="在编辑器中打开"><iconpark-icon icon-id="layout-five" size="14" color="currentColor"></iconpark-icon></button>
        <div id="editor-dropdown" class="editor-dropdown">
          <div class="editor-dropdown-item" data-editor="vscode">使用 VS Code 打开</div>
          <div class="editor-dropdown-item" data-editor="cursor">使用 Cursor 打开</div>
          <div class="editor-dropdown-item" data-editor="trae">使用 Trae 打开</div>
        </div>
        <button id="btn-export" title="导出"><iconpark-icon icon-id="upload" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-inspect" title="抓取元素"><iconpark-icon icon-id="magic" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-settings" title="Settings"><iconpark-icon icon-id="setting-two" size="14" color="currentColor"></iconpark-icon></button>
      </div>
      <div class="header-right">
        <div class="zoom-control" title="预览缩放">
          <button id="btn-zoom-out"><iconpark-icon icon-id="minus" size="12" color="currentColor"></iconpark-icon></button>
          <span id="zoom-value">100%</span>
          <button id="btn-zoom-in"><iconpark-icon icon-id="plus" size="12" color="currentColor"></iconpark-icon></button>
        </div>
        <button id="btn-toggle-docs" title="Toggle Docs"><iconpark-icon icon-id="document-folder" size="14" color="currentColor"></iconpark-icon></button>
        <button id="btn-theme" title="Toggle Theme"><iconpark-icon icon-id="moon" size="14" color="currentColor"></iconpark-icon></button>
      </div>
    </header>

    <div id="shell-main">
      <aside id="panel-nav">
        <div id="panel-nav-top">
          <div class="nav-tabs">
            <button data-tab="pages" class="active">Pages</button>
            <button data-tab="components">Components</button>
          </div>
          <div class="tree-container" id="tree-root"></div>
        </div>
        <div class="resizer resizer-h" data-target="panel-nav-top" data-dir="h" id="rules-resizer"></div>
        <div id="panel-nav-bottom">
          <div class="rules-header" id="rules-header" title="点击收起/展开">
            <span class="rules-header-arrow">▼</span>
            <span>Rules</span>
          </div>
          <div class="rules-list" id="rules-root"></div>
        </div>
      </aside>
      <div class="resizer resizer-v" data-target="panel-nav" data-dir="v"></div>

      <section id="panel-center">
        <div class="iframe-wrapper" id="iframe-wrapper">
          <iframe id="preview-frame" src="about:blank"></iframe>
        </div>
        <div id="rule-viewer" class="hidden">
          <div class="rule-viewer-content" id="rule-viewer-content"></div>
        </div>
        <div class="resizer resizer-h" data-target="prompt-box" data-dir="h" data-invert="true" id="prompt-resizer"></div>
        <div id="prompt-box">
          <textarea id="prompt-input" placeholder="描述你想要的修改，例如：将表格背景改为深蓝色，增加一个导出按钮..."></textarea>
          <div class="prompt-actions">
            <button id="btn-prompt-collapse" class="text-btn" title="收起">
              <iconpark-icon icon-id="down" size="14" color="currentColor"></iconpark-icon>
            </button>
            <button id="btn-prompt-expand" class="text-btn" title="展开" style="display:none;">
              <iconpark-icon icon-id="up" size="14" color="currentColor"></iconpark-icon>
            </button>
            <span id="prompt-context" class="prompt-context"></span>
            <span id="prompt-status">点击复制按钮后粘贴到Agent即可</span>
            <button id="btn-prompt-copy">复制提示词</button>
          </div>
        </div>
      </section>

      <div class="resizer resizer-v" data-target="panel-docs" data-dir="v" data-invert="true" id="docs-resizer"></div>
      <aside id="panel-docs" class="hidden">
        <div class="doc-tabs" id="doc-tabs">
          <div class="doc-tabs-scroll" id="doc-tabs-scroll"></div>
          <button class="doc-tab-add" id="btn-doc-add" title="添加文档">
            <iconpark-icon icon-id="add-one" size="12" color="currentColor"></iconpark-icon>
          </button>
        </div>
        <div class="doc-content" id="doc-content"></div>
        <div class="doc-actions">
          <button id="btn-doc-edit">Edit</button>
          <button id="btn-doc-save">Save</button>
        </div>
      </aside>
    </div>
  </div>

  <div id="settings-modal" class="settings-modal">
    <div class="settings-modal-overlay"></div>
    <div class="settings-modal-content">
      <div class="settings-modal-header">
        <h4>项目设置</h4>
        <button class="settings-modal-close" id="settings-close">&times;</button>
      </div>
      <div class="settings-modal-body">
        <label for="project-name-input">项目名称</label>
        <input type="text" id="project-name-input" placeholder="Prototype">

        <label>项目 ID</label>
        <div class="settings-project-id" id="settings-project-id"></div>

        <label>托管项目</label>
        <div class="host-project-row">
          <div class="host-project-select-wrap" id="host-project-wrap">
            <input type="text" id="host-project-search" placeholder="搜索或选择项目..." autocomplete="off">
            <div class="host-project-dropdown" id="host-project-dropdown"></div>
            <div class="host-project-linked" id="host-project-linked" style="display:none;">
              <span id="host-project-linked-name"></span>
              <button class="text-btn" id="btn-unlink-project" title="解除关联">
                <iconpark-icon icon-id="close-small" size="12" color="currentColor"></iconpark-icon>
              </button>
            </div>
          </div>
          <button class="text-btn" id="btn-create-remote-project" title="创建新项目">
            <iconpark-icon icon-id="plus" size="14" color="currentColor"></iconpark-icon>
          </button>
        </div>
        <div class="host-project-hint" id="host-project-hint"></div>
      </div>
      <div class="settings-modal-footer">
        <button id="settings-modal-cancel">取消</button>
        <button id="btn-save-settings" class="primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 创建远程项目弹窗 -->
  <div class="modal-overlay" id="create-remote-project-modal">
    <div class="modal-content" style="width:360px;">
      <div class="modal-title">创建新项目</div>
      <div class="modal-body">
        <label for="new-remote-project-name">项目名称</label>
        <input type="text" id="new-remote-project-name" placeholder="请输入项目名称" autocomplete="off">
        <div id="create-remote-error" class="form-error"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-create-remote">取消</button>
        <button class="btn-primary" id="btn-confirm-create-remote">创建</button>
      </div>
    </div>
  </div>

  <script src="/client/js/icons.js"></script>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      window.__axhostProjectId = params.get('project') || '';
    })();
  </script>
  <script src="/client/assets/marked.min.js"></script>
  <script src="/client/js/api-client.js"></script>
  <script src="/client/js/md-renderer.js"></script>
  <!-- Export Modal -->
  <div id="export-modal" class="export-modal">
    <div class="export-modal-overlay"></div>
    <div class="export-modal-content">
      <div class="export-modal-header">
        <h4>导出项目</h4>
        <button class="export-modal-close" id="export-modal-close">&times;</button>
      </div>
      <div class="export-modal-body">
        <div class="export-left-panel">
          <div class="export-mode-tabs">
            <button data-mode="local" class="active">本地导出</button>
            <button data-mode="remote">线上发布</button>
          </div>
          <div class="export-mode-content" id="export-local-content">
            <div class="export-field">
              <label>项目名称</label>
              <input type="text" id="export-project-name" placeholder="项目名称">
            </div>
            <div class="export-field">
              <label>保存目录</label>
              <div class="export-dir-row">
                <input type="text" id="export-target-dir" placeholder="保存目录">
                <button id="export-select-dir">选择</button>
                <input type="file" id="export-dir-input" webkitdirectory directory style="display:none">
              </div>
            </div>
          </div>
          <div class="export-mode-content hidden" id="export-remote-content">
            <div class="export-field">
              <label>托管项目</label>
              <div class="host-project-row" id="export-host-project-row">
                <div class="host-project-select-wrap" id="export-host-project-wrap">
                  <input type="text" id="export-host-project-search" placeholder="搜索或选择项目..." autocomplete="off">
                  <div class="host-project-dropdown" id="export-host-project-dropdown"></div>
                  <div class="host-project-linked" id="export-host-project-linked" style="display:none;">
                    <span id="export-host-project-linked-name"></span>
                    <button class="text-btn" id="export-btn-unlink-project" title="解除关联">
                      <iconpark-icon icon-id="close-small" size="12" color="currentColor"></iconpark-icon>
                    </button>
                  </div>
                </div>
                <button class="text-btn" id="export-btn-create-remote-project" title="创建新项目">
                  <iconpark-icon icon-id="plus" size="14" color="currentColor"></iconpark-icon>
                </button>
              </div>
              <div class="host-project-hint" id="export-host-project-hint"></div>
            </div>
          </div>
        </div>
        <div class="export-right-panel">
          <div class="export-tabs">
            <button data-tab="pages" class="active">pages</button>
            <button data-tab="components">components</button>
          </div>
          <div class="export-tree" id="export-tree"></div>
          <div class="export-select-all">
            <label><input type="checkbox" id="export-select-all" checked> 全选</label>
          </div>
        </div>
      </div>
      <div class="export-modal-footer">
        <button id="export-cancel">取消</button>
        <button id="export-confirm" class="primary">导出</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="export-create-remote-modal">
    <div class="modal-content" style="width:360px;">
      <div class="modal-title">创建新项目</div>
      <div class="modal-body">
        <label for="export-new-remote-project-name">项目名称</label>
        <input type="text" id="export-new-remote-project-name" placeholder="请输入项目名称" autocomplete="off">
        <div id="export-create-remote-error" class="form-error"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="export-btn-cancel-create-remote">取消</button>
        <button class="btn-primary" id="export-btn-confirm-create-remote">创建</button>
      </div>
    </div>
  </div>

  <script src="/client/js/tree-nav.js"></script>
  <script src="/client/js/doc-panel.js"></script>
  <script src="/client/js/export-modal.js"></script>
  <script src="/client/js/inspector.js"></script>
  <script src="/client/js/prompt-box.js"></script>
  <script>
    (function(){
      const btnTheme = document.getElementById('btn-theme');
      const icon = btnTheme.querySelector('iconpark-icon');
      const isDark = localStorage.getItem('axhost-theme') === 'dark';
      if (isDark) document.body.classList.add('dark');
      if (icon) icon.setAttribute('icon-id', document.body.classList.contains('dark') ? 'dome-light' : 'moon');
      btnTheme.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const dark = document.body.classList.contains('dark');
        localStorage.setItem('axhost-theme', dark ? 'dark' : 'light');
        if (icon) icon.setAttribute('icon-id', dark ? 'dome-light' : 'moon');
        document.querySelectorAll('iconpark-icon').forEach(el => {
          el.setAttribute('color', 'currentColor');
          el.setAttribute('stroke', 'currentColor');
          el.setAttribute('fill', 'currentColor');
        });
      });

      // 接收父页面主题同步
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'axhost-theme') {
          const dark = e.data.theme === 'dark';
          const currentlyDark = document.body.classList.contains('dark');
          if (currentlyDark !== dark) {
            document.body.classList.toggle('dark', dark);
            localStorage.setItem('axhost-theme', dark ? 'dark' : 'light');
            if (icon) icon.setAttribute('icon-id', dark ? 'dome-light' : 'moon');
          }
        }
      });
    })();
  </script>
  <script src="/client/js/shell.js"></script>
</body>
</html>
